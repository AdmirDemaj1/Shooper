# ── Edge cases ────────────────────────────────────────────────────────────────

- id: edge_minimal
  lang: en
  description: "Edge: minimal input, just a make"
  input: "Golf"
  must_not_be_null: [name]

- id: edge_c_class_year
  lang: en
  description: "Edge: user's real input (make + model + single year)"
  input: "C CLASS viti 2016"
  expect:
    make: "Mercedes"
  must_not_be_null: [name]

- id: edge_year_only
  lang: sq
  description: "Edge: year range only"
  input: "makinë viti 2015-2018, nafte"
  expect:
    year_min: 2015
    year_max: 2018
    fuel_type: "diesel"
  must_not_be_null: [name]

- id: edge_high_budget
  lang: en
  description: "Edge: high-end budget"
  input: "BMW 5 series or Mercedes E class, automatic, diesel, 2019-2022, under 40000 EUR"
  expect:
    transmission: "automatic"
    fuel_type: "diesel"
    year_min: 2019
    price_max: 40000
  must_not_be_null: [name]

- id: edge_old_car
  lang: en
  description: "Edge: old classic car"
  input: "Mercedes 190E or W124, petrol, any year, max 5000 EUR"
  expect:
    make: "Mercedes"
    fuel_type: "petrol"
    price_max: 5000
  must_not_be_null: [name]

- id: edge_radius_small
  lang: sq
  description: "Edge: small radius near city"
  input: "Golf 6 ose 7 afër Shkodrës brenda 30 km, nën 7000 euro"
  expect:
    radius_km: 30
    price_max: 7000
  must_not_be_null: [name]
