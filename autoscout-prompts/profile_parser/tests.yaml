# AutoScout profile parser regression tests
# Each case: id, lang (sq/en), description, input, expect (field: value), must_not_be_null

# ── Albanian (sq) ─────────────────────────────────────────────────────────────

- id: sq_golf_basic
  lang: sq
  description: "Albanian: make + model only"
  input: "kërkoj Golf 6"
  expect:
    model: "Golf 6"
  must_not_be_null: [name]

- id: sq_golf_price
  lang: sq
  description: "Albanian: model + price in EUR"
  input: "Golf 6 nën 8000 euro"
  expect:
    model: "Golf 6"
    price_max: 8000
    currency: "EUR"
  must_not_be_null: [name]

- id: sq_bmw_diesel_years
  lang: sq
  description: "Albanian: make + fuel + year range"
  input: "BMW Serie 3, nafte, viti 2015 deri 2020"
  expect:
    make: "BMW"
    fuel_type: "diesel"
    year_min: 2015
    year_max: 2020
  must_not_be_null: [name]

- id: sq_vw_full
  lang: sq
  description: "Albanian: VW Golf full criteria"
  input: "Volkswagen Golf 7, automatike, benzinë, çmim max 12000 euro, max 180 mijë km"
  expect:
    make: "Volkswagen"
    model: "Golf 7"
    transmission: "automatic"
    fuel_type: "petrol"
    price_max: 12000
    currency: "EUR"
    mileage_max: 180000
  must_not_be_null: [name]

- id: sq_toyota_mileage
  lang: sq
  description: "Albanian: Toyota with mileage cap"
  input: "kërkoj Toyota Yaris ose Corolla, nafte, nën 6000 euro, max 150 mijë km"
  expect:
    make: "Toyota"
    fuel_type: "diesel"
    price_max: 6000
    mileage_max: 150000
  must_not_be_null: [name]

- id: sq_audi_full
  lang: sq
  description: "Albanian: Audi full criteria"
  input: "Audi A4 2012-2016, automatike, nën 9000 euro, kilometra max 200 mijë"
  expect:
    make: "Audi"
    model: "A4"
    year_min: 2012
    year_max: 2016
    transmission: "automatic"
    price_max: 9000
    mileage_max: 200000
  must_not_be_null: [name]

- id: sq_ford_petrol_manual
  lang: sq
  description: "Albanian: year from + fuel + transmission"
  input: "Ford Focus ose Golf, viti nga 2010, benzinë, manuale"
  expect:
    year_min: 2010
    fuel_type: "petrol"
    transmission: "manual"
  must_not_be_null: [name]

- id: sq_mercedes_c
  lang: sq
  description: "Albanian: Mercedes C Class"
  input: "Mercedes C Class, viti 2018, automatike, nën 20000 euro"
  expect:
    make: "Mercedes"
    model: "C Class"
    transmission: "automatic"
    price_max: 20000
  must_not_be_null: [name]

- id: sq_opel_budget
  lang: sq
  description: "Albanian: Opel budget car with mileage"
  input: "Opel Astra ose Corsa, çmim deri 4000 euro, max 180 mijë km"
  expect:
    make: "Opel"
    price_max: 4000
    mileage_max: 180000
  must_not_be_null: [name]

- id: sq_peugeot_years
  lang: sq
  description: "Albanian: Peugeot diesel manual with years"
  input: "Peugeot 308 ose 207, nafte, manuale, viti 2013-2017"
  expect:
    make: "Peugeot"
    fuel_type: "diesel"
    transmission: "manual"
    year_min: 2013
    year_max: 2017
  must_not_be_null: [name]

- id: sq_kia_sportage
  lang: sq
  description: "Albanian: Kia Sportage diesel"
  input: "Kia Sportage nafte 2016-2019 nën 12000 euro"
  expect:
    make: "Kia"
    model: "Sportage"
    fuel_type: "diesel"
    year_min: 2016
    year_max: 2019
    price_max: 12000
  must_not_be_null: [name]

- id: sq_definition_of_done
  lang: sq
  description: "Albanian: Sprint 2 definition-of-done example"
  input: "VW Golf 6 ose 7, viti 2010 deri 2015, çmim deri 8000 euro, kilometra max 200 mijë, afër Tiranës 50 km"
  expect:
    make: "Volkswagen"
    year_min: 2010
    year_max: 2015
    price_max: 8000
    currency: "EUR"
    mileage_max: 200000
    radius_km: 50
  must_not_be_null: [name]

- id: sq_lpg
  lang: sq
  description: "Albanian: LPG fuel type"
  input: "makinë me gaz LPG nën 5000 euro"
  expect:
    fuel_type: "lpg"
    price_max: 5000
  must_not_be_null: [name]

- id: sq_electric_hybrid
  lang: sq
  description: "Albanian: electric or hybrid"
  input: "elektrike ose hibride, viti 2019 ose me vonë, nën 15000 euro"
  expect:
    year_min: 2019
    price_max: 15000
  must_not_be_null: [name]

- id: sq_renault_clio
  lang: sq
  description: "Albanian: Renault Clio years + mileage"
  input: "Renault Clio 2010-2015, benzinë, manuale, max 120 mijë km"
  expect:
    make: "Renault"
    model: "Clio"
    year_min: 2010
    year_max: 2015
    fuel_type: "petrol"
    transmission: "manual"
    mileage_max: 120000
  must_not_be_null: [name]

- id: sq_skoda_octavia
  lang: sq
  description: "Albanian: Skoda Octavia"
  input: "Skoda Octavia nafte 2015-2019, automatike, nën 11000 euro"
  expect:
    make: "Skoda"
    model: "Octavia"
    fuel_type: "diesel"
    transmission: "automatic"
    year_min: 2015
    year_max: 2019
    price_max: 11000
  must_not_be_null: [name]

