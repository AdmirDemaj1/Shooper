name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "autoscout-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "autoscout-backend/**"
      - ".github/workflows/backend-ci.yml"

env:
  # Note: Railway handles Docker builds and deployments automatically
  # No need to push to container registry
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autoscout-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry install

      - name: Lint with ruff
        run: poetry run ruff check .

      - name: Format check with black
        run: poetry run black --check .

      - name: Type check with mypy
        run: poetry run mypy autoscout --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autoscout-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autoscout_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry install

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/autoscout_test
          REDIS_URL: redis://localhost:6379/0
        run: poetry run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/autoscout_test
          REDIS_URL: redis://localhost:6379/0
          FASTAPI_ENV: test
        run: poetry run pytest tests/ -v --cov=autoscout --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./autoscout-backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Railway Deployment
        run: |
          # Railway auto-triggers on push to main
          # This step is just a placeholder to confirm CI passed
          echo "Lint and test passed. Railway will auto-deploy."
          # Optional: trigger via Railway API if needed
          # curl -X POST https://api.railway.app/webhooks/github \
          #   -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
          #   -d "repo=${{ github.repository }}&branch=main"

  notify:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             ([ "${{ github.event_name }}" = "push" ] && [ "${{ needs.build.result }}" = "failure" ]); then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack (failure)
        if: steps.status.outputs.status == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Backend CI failed for ${{ github.ref }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Backend CI *failed* for <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.ref }}>"
                  }
                }
              ]
            }
