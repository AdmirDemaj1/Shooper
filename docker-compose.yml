services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoscout_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./autoscout-backend
    ports:
      - "8000:8000"
    env_file:
      - ./autoscout-backend/.env
    environment:
      FASTAPI_ENV: dev
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/autoscout_dev
      REDIS_URL: redis://redis:6379/0
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./autoscout-backend:/app
    command: sh -c "poetry run alembic upgrade head && poetry run uvicorn autoscout.main:app --host 0.0.0.0 --port 8000 --reload"

  crawler:
    build: ./autoscout-crawlers
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/autoscout_dev
    depends_on:
      - redis
      - postgres
    volumes:
      - ./autoscout-crawlers:/app
    command: poetry run celery -A crawler.worker worker --loglevel=info

volumes:
  postgres_data:
